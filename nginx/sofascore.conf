# ─── Matchstat SofaScore Backend — Nginx Integration Guide ──────────────────
#
# DATA FLOW (important to understand before reading this config):
#
#   Browser / Frontend (Angular / Next.js)
#       │
#       │  calls existing matchstat.com URL
#       ▼
#   Nginx (matchstat.com)
#       │
#       │  /tn-base/reverse-proxy/football/api/v1/h2h/sports/{path}
#       │  ← this path already exists on matchstat.com nginx.
#       │    Currently it forwards DIRECTLY to sportsdata365.com (the paid API).
#       │    We are RE-ROUTING it to our new sofascore-nest-api instead.
#       ▼
#   sofascore-nest-api  (this service, port 3010)
#       │
#       │  1. Looks up (path_key, params_hash) in raw_snapshots table
#       │  2. If fresh → returns immediately (no paid API call)
#       │  3. If stale/missing → calls the actual API, persists, returns
#       ▼
#   sportsdata365.com/football/api/v1/h2h/sports/{path}
#   ← THE ACTUAL PAID API (only called when DB doesn't have fresh data)
#
# In other words:
#   - /tn-base/reverse-proxy/ is NOT something we call. It's the PUBLIC URL
#     that our nginx SERVES. We re-route it here to our backend.
#   - sportsdata365.com IS the actual provider our backend calls on cache miss.
#
# WHAT CHANGES WITH THIS CONFIG vs BEFORE:
#   BEFORE: nginx → sportsdata365.com  (every request hits paid API)
#   AFTER:  nginx → sofascore-nest-api → PostgreSQL (90%+) / sportsdata365.com (rare)
#
# ─────────────────────────────────────────────────────────────────────────────
#
# NOTE ON img.sofascore.com (Image CDN):
#   Images are served from img.sofascore.com (different host, different domain).
#   These are NOT proxied through our backend — they are referenced directly by
#   the frontend using the full URL (e.g. https://img.sofascore.com/api/v1/player/826643/image).
#   SofaContractService.imgPlayerUrl() etc. return full absolute URLs for this reason.
#   If you need to proxy images through matchstat.com in the future, add an
#   `upstream img_cdn` block pointing to img.sofascore.com and a location for
#   /sofa-img/... that proxies there.
#
# ─────────────────────────────────────────────────────────────────────────────

upstream sofascore_backend {
    server sofascore-api:3010;
    keepalive 32;
}

# Rate-limit zone: 60 req/s per IP (the backend handles throttling too)
limit_req_zone $binary_remote_addr zone=sofa_proxy:10m rate=60r/s;

server {
    listen 80;
    server_name matchstat.com www.matchstat.com;

    # ─── EXISTING PUBLIC URL → Our new sofascore-nest-api backend ────────────
    #
    # This location REPLACES what was previously a direct proxy to sportsdata365.
    # The frontend, WordPress, and Angular clients keep calling the same URL.
    # Only the nginx upstream destination changes: sportsdata365 → our backend.
    #
    # Public URL shape (unchanged):
    #   /tn-base/reverse-proxy/football/api/v1/h2h/sports/{sofaPath}
    #
    # Internal URL (our backend):
    #   http://sofascore-nest-api:3010/api/v1/sofa/football/{sofaPath}
    #
    location ~ ^/tn-base/reverse-proxy/football/api/v1/h2h/sports/(.+?)/?$ {
        limit_req zone=sofa_proxy burst=120 nodelay;

        # Route to our DB-first backend instead of the paid provider
        proxy_pass http://sofascore_backend/api/v1/sofa/football/$1$is_args$args;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Short nginx cache layer on top of the DB cache
        # (only for responses our backend tagged as 'database' or 'provider')
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;

        # Pass backend source headers through to frontend for debugging
        proxy_pass_header X-Sofa-Source;
        proxy_pass_header X-Sofa-Fetched-At;
        proxy_pass_header X-Sofa-Expires-At;

        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # ─── Direct SofaScore API proxy (all sports, all paths) ─────────────────
    #
    # Antigravity confirmed SofaScore fires paths across all sports on the same
    # /api/v1/ namespace: football, tennis, basketball, baseball, etc.
    # This catch-all location routes ANY /api/v1/sofa/** request to our backend.
    # The backend applies the DB cache-aside for all sport paths uniformly.
    #
    location ~ ^/api/v1/sofa/(.+?)/?$ {
        limit_req zone=sofa_proxy burst=120 nodelay;

        proxy_pass http://sofascore_backend/api/v1/sofa/$1$is_args$args;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass_header X-Sofa-Source;
        proxy_pass_header X-Sofa-Fetched-At;
        proxy_pass_header X-Sofa-Expires-At;

        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # ─── Internal ops endpoints (restrict to private network) ────────────────
    #
    # Protect: /api/v1/internal/ingestion/*, /api/v1/internal/metrics
    # Exposes: backfill triggers, job audit log, metrics dashboard
    #
    location /api/v1/internal/ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://sofascore_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Health probes (open for load balancer / uptime monitors) ────────────
    location /api/v1/health {
        proxy_pass http://sofascore_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
}
